<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - framework()</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- HEADER -->
  <header class="auth-header">
    <div class="logo" onclick="window.location.href='index.html'">framework()</div>
  </header>

  <!-- AUTH CONTAINER -->
  <div class="auth-container">
    <div class="auth-wrapper">
      <div class="auth-card">
        <h1>Create Your Account</h1>
        <p class="auth-subtitle">Join the personality-based productivity revolution</p>

        <form id="signup-form" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Choose your username" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a strong password" required>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm your password" required>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
          </div>

          <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div class="auth-link">
          Already have an account? <a href="login.html">Log in here</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/auth/auth.js"></script>
  <script src="js/auth/signup.js"></script>

</body>
</html>
