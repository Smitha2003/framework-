<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - framework()</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- HEADER -->
  <header class="dashboard-header">
    <div class="header-left">
      <div class="logo" onclick="window.location.href='index.html'">framework()</div>
      <div class="brain-type-badge" id="brain-type-badge"></div>
    </div>
    <div class="header-right">
      <div class="user-info">
        <span class="greeting" id="greeting"></span>
        <span class="username" id="username"></span>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="dashboard-main">
    <div class="dashboard-layout">
      <!-- Sidebar (injected) -->
      <aside id="dashboard-sidebar" class="dashboard-sidebar"></aside>

      <!-- Dashboard Content Container -->
      <div id="dashboard-content" class="dashboard-content">
        <!-- Content will be dynamically loaded based on brain type -->
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading your personalized dashboard...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/core/router.js"></script>
  <script src="js/auth/auth.js"></script>
  <script src="js/quiz/quizLogic.js"></script>
  <script src="js/dashboards/architect.js"></script>
  <script src="js/dashboards/sprinter.js"></script>
  <script src="js/dashboards/dreamer.js"></script>
  <script src="js/dashboards/juggler.js"></script>
  <script src="js/dashboards/minimalist.js"></script>
  <script src="js/dashboards/components/todo.js"></script>
  <script src="js/dashboards/sidebar.js"></script>
  <script src="js/dashboards/dashboard.js"></script>

</body>
</html>
