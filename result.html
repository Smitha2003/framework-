<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Brain Type - framework()</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo" onclick="window.location.href='index.html'">framework()</div>
  </header>

  <!-- RESULT CONTAINER -->
  <div class="result-container">
    <div class="result-wrapper">
      <h1 class="result-title">Your Brain Type</h1>
      
      <div class="result-card">
        <div class="brain-type-emoji" id="emoji"></div>
        <h2 id="brain-type-title" class="brain-type-title"></h2>
        <p id="brain-type-description" class="brain-type-description"></p>
        
        <div class="strength-section">
          <h3>Your Strength</h3>
          <p id="strength"></p>
        </div>
        
        <div class="challenge-section">
          <h3>Your Challenge</h3>
          <p id="challenge"></p>
        </div>
        
        <div class="dashboard-info">
          <h3>Your Personalized Dashboard</h3>
          <p id="dashboard-info"></p>
        </div>
      </div>

      <!-- CTA -->
      <div class="cta-section">
        <h3>Sign Up to Unlock Your Full Potential</h3>
        <p>Create your personalized <span id="brain-type-name"></span> dashboard and start optimizing your workflow</p>
        <button class="signup-btn" onclick="navigateToSignup()">Sign Up Now</button>
        <p class="login-prompt">Already have an account? <a href="login.html">Log in here</a></p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/auth/auth.js"></script>
  <script src="js/quiz/quizLogic.js"></script>
  <script src="js/auth/result.js"></script>

</body>
</html>
