<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log In - framework()</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- HEADER -->
  <header class="auth-header">
    <div class="logo" onclick="window.location.href='index.html'">framework()</div>
  </header>

  <!-- AUTH CONTAINER -->
  <div class="auth-container">
    <div class="auth-wrapper">
      <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Log in to your cognitive dashboard</p>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="auth-btn">Log In</button>
        </form>

        <div class="auth-link">
          Don't have an account? <a href="signup.html">Sign up here</a>
        </div>

        <!-- Demo Users Info -->
        <div class="demo-section">
          <p class="demo-title">Demo Accounts:</p>
          <div class="demo-users">
            <div class="demo-user">
              <strong>architect</strong><br>
              <small>architect123</small>
            </div>
            <div class="demo-user">
              <strong>sprinter</strong><br>
              <small>sprinter123</small>
            </div>
            <div class="demo-user">
              <strong>dreamer</strong><br>
              <small>dreamer123</small>
            </div>
            <div class="demo-user">
              <strong>juggler</strong><br>
              <small>juggler123</small>
            </div>
            <div class="demo-user">
              <strong>minimalist</strong><br>
              <small>minimalist123</small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/core/router.js"></script>
  <script src="js/auth/auth.js"></script>
  <script src="js/auth/login.js"></script>

</body>
</html>
